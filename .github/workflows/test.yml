name: Test

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node:
    name: Node tests and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint extension
        run: npm run lint

  scale:
    name: GPX scale test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Parse a production-scale GPX track
        run: npm run test:scale

  chrome:
    name: Chrome extension smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chrome for Testing
        run: npx playwright install --with-deps chromium

      - name: Verify the real Chrome extension
        run: npm run verify:chrome

  firefox:
    name: Firefox extension smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Firefox
        # browser-actions/setup-firefox v1.7.2
        uses: browser-actions/setup-firefox@8058e910ee76e74bb76b7b2e5b61a55b3a65ed78
        with:
          firefox-version: latest

      - name: Install geckodriver
        # browser-actions/setup-geckodriver release for 6e97fca80859e868aed49bd960f7b73520a077f5
        uses: browser-actions/setup-geckodriver@eb8b0670366f719ca31703766a8cb7e3ea2c56ed

      - name: Verify the real Firefox extension
        run: npm run verify:firefox
