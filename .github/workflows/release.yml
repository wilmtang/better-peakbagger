name: Release browser extensions

on:
  push:
    tags:
      - "v*"

concurrency:
  group: browser-store-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out tagged source
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate tag and version metadata
        run: npm run release:check -- "$GITHUB_REF_NAME"

      - name: Run tests
        run: npm test

      - name: Lint extension
        run: npm run lint

      - name: Build store package
        run: npm run build

      - name: Verify store package contents
        run: npm run release:verify-archive -- web-ext-artifacts/*.zip

      - name: Preserve verified store package
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: browser-extension-${{ github.ref_name }}
          path: web-ext-artifacts/*.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  chrome:
    name: Submit Chrome Web Store
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: browser-stores
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out publisher script
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download verified store package
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: browser-extension-${{ github.ref_name }}
          path: release-package

      - name: Check Chrome publisher configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
        run: |
          for name in GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT CHROME_PUBLISHER_ID CHROME_EXTENSION_ID; do
            if [ -z "${!name}" ]; then
              echo "Missing browser-stores variable: $name" >&2
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        id: google-auth
        # google-github-actions/auth v3.0.0
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Submit Chrome package for review
        env:
          CHROME_WEBSTORE_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
        run: node scripts/publish-chrome.mjs release-package/*.zip

  firefox:
    name: Submit Firefox Add-ons
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: browser-stores
    permissions:
      contents: read
    steps:
      - name: Check out tagged source
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Revalidate tagged source
        run: npm run release:check -- "$GITHUB_REF_NAME"

      - name: Create Firefox listing metadata
        run: npm run release:metadata:firefox

      - name: Check Firefox publisher configuration
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$WEB_EXT_API_KEY" ] || [ -z "$WEB_EXT_API_SECRET" ]; then
            echo "Missing AMO_JWT_ISSUER or AMO_JWT_SECRET in browser-stores" >&2
            exit 1
          fi

      - name: Submit Firefox package for review
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npm run release:sign:firefox
