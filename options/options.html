<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Better Peakbagger — Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <main class="wrap">
        <header class="head">
            <img class="logo" src="../icons/icon-48.png" alt="" width="40" height="40">
            <div>
                <h1>Better Peakbagger</h1>
                <p class="sub">These settings apply across all Peakbagger pages.</p>
            </div>
        </header>

        <section class="card">
            <div class="row">
                <label class="label" for="units">
                    <span class="title">Units</span>
                    <span class="desc">Distance and elevation in the GPX chart. “Auto” matches whatever the ascent page shows.</span>
                </label>
                <div class="control">
                    <select id="units">
                        <option value="auto">Auto (match page)</option>
                        <option value="imperial">Imperial (mi / ft)</option>
                        <option value="metric">Metric (km / m)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <label class="label" for="theme">
                    <span class="title">Theme</span>
                    <span class="desc">Dark or light mode for Peakbagger pages and this extension’s panels.</span>
                </label>
                <div class="control">
                    <select id="theme">
                        <option value="system">Follow system</option>
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <label class="label" for="minwords">
                    <span class="title">Default minimum trip-report words</span>
                    <span class="desc">The starting “≥ N words” threshold for the ascent-list beta filter.</span>
                </label>
                <div class="control">
                    <input id="minwords" type="number" min="1" step="1" inputmode="numeric">
                </div>
            </div>
        </section>

        <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="../src/settings.js"></script>
    <script src="options.js"></script>
</body>
</html>
