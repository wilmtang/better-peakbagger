<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peakbagger Drafts</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header class="brand">
      <img src="../icons/icon-32.png" width="28" height="28" alt="">
      <div>
        <h1>Peakbagger Drafts</h1>
        <p id="provider-label">Capture this activity</p>
      </div>
      <button id="open-settings" class="settings-button" type="button" aria-label="Open Settings" title="Settings">
        <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
          <path d="M12 8.7a3.3 3.3 0 1 0 0 6.6 3.3 3.3 0 0 0 0-6.6Zm8 3.3-2.1-1.2.1-2.4-2.4-1.4-2 1.3L11.5 7 9.4 8.3l-2-1.3L5 8.4l.1 2.4L3 12l2.1 1.2L5 15.6 7.4 17l2-1.3 2.1 1.3 2.1-1.3 2 1.3 2.4-1.4-.1-2.4L20 12Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <section id="state" aria-live="polite"></section>
    <section id="results" hidden>
      <div id="track-summary" class="summary"></div>
      <div class="result-heading">
        <h2>Detected peaks</h2>
        <span id="selection-count"></span>
      </div>
      <div id="peak-list" class="peak-list"></div>
      <p class="privacy-note">Peak lookup sends small track-corridor boxes to Peakbagger. Opening drafts sends the reduced GPX track with coordinates, elevation, and time to Preview. Save is always manual.</p>
      <button id="open-drafts" class="primary" type="button"></button>
      <button id="clear-capture" class="secondary" type="button" hidden>Delete captured track data</button>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
