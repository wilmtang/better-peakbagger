<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Synthetic recent GPS tracks</title>
  <style>
    html, body, #map { width: 100%; height: 100%; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #map { position: relative; background: linear-gradient(135deg, #e5ecd8, #b6cda8); }
    svg { width: 100%; height: 100%; }
    path { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    #trip-details { display: none; position: absolute; top: 24px; left: 24px; padding: 10px 12px; border-radius: 8px; background: #fff; box-shadow: 0 2px 10px #0003; }
    #selmap { position: absolute; top: 24px; right: 24px; }
  </style>
  <link rel="stylesheet" href="/src/terrain-map.css">
  <script>
    // Showcase/harness stubs so the production content scripts run without the
    // packaged extension. Not shipped — this is a synthetic visual fixture.
    window.chrome = { runtime: { getURL: path => `/${path}` } };
    (() => {
      const params = new URLSearchParams(location.search);
      const settings = {
        enable3dMap: true,
        theme: params.get('theme') === 'dark' ? 'dark' : 'light',
        mapRouteColor: '#d9483b', mapRouteWidth: 5,
        mapRouteCasingColor: '#ffffff', mapRouteCasingWidth: 9,
        terrainCacheLimitMb: 256
      };
      window.BPBSettings = { get: async () => settings, subscribe: () => () => {} };
    })();
  </script>
</head>
<body>
  <div id="map">
    <svg viewBox="0 0 900 600" role="img" aria-label="Synthetic multi-route map">
      <path id="route-a" stroke="#e34a33" stroke-width="3" d="M80 520 C180 430 240 480 330 350 S520 260 620 120"></path>
      <path id="route-b" stroke="#3182bd" stroke-width="3" d="M120 550 C260 430 300 390 430 340 S600 230 760 90"></path>
      <path id="hover-effect" stroke="#ffd92f" stroke-width="12" d="M60 570 L140 500"></path>
    </svg>
    <div id="trip-details">Synthetic route A · native trip-report link</div>
    <select id="selmap"><option value="L_LOCAL">Synthetic topographic map</option></select>
  </div>
  <script>
    class Polyline {
      constructor(points, options, path) {
        this.points = points;
        this.options = { ...options };
        this.path = path;
        this._events = {};
        this._map = null;
        if (path) {
          for (const type of ['mouseover', 'mouseout', 'click']) {
            path.addEventListener(type, () => this.fire(type));
          }
        }
      }
      getLatLngs() { return this.points; }
      setStyle(style) {
        Object.assign(this.options, style);
        if (style.weight !== undefined && this.path) this.path.setAttribute('stroke-width', String(style.weight));
        return this;
      }
      on(type, handler) { (this._events[type] ||= []).push(handler); return this; }
      fire(type) { for (const handler of this._events[type] || []) handler({ type, target: this }); }
    }
    class Polygon extends Polyline {}
    class MapStub {
      constructor(layers) {
        this.layers = [];
        this.events = {};
        layers.forEach(layer => this.addLayer(layer));
      }
      eachLayer(callback) { this.layers.slice().forEach(callback); }
      on(type, handler) { (this.events[type] ||= []).push(handler); return this; }
      addLayer(layer) {
        layer._map = this;
        this.layers.push(layer);
        for (const handler of this.events.layeradd || []) handler({ layer });
        return this;
      }
    }

    const points = [
      { lat: 48.7600, lng: -121.8300 },
      { lat: 48.7660, lng: -121.8220 },
      { lat: 48.7720, lng: -121.8160 },
      { lat: 48.7780, lng: -121.8110 },
      { lat: 48.7840, lng: -121.8080 }
    ];
    // A code with no built-in drape spec, backed by a live Leaflet layer that
    // points at the harness's synthetic tiles, so the 3D drape resolves to a
    // local raster (no network) via the shared basemap module's live-layer path.
    window.L_LOCAL = {
      _url: '/scripts/showcase/terrain-tiles/{z}/{x}/{y}.png',
      options: { minZoom: 0, maxZoom: 16, attribution: 'Synthetic 2D fixture' }
    };
    window.routeA = new Polyline(points, { color: '#e34a33', weight: 3 }, document.getElementById('route-a'));
    window.routeB = new Polyline(points, { color: '#3182bd', weight: 3 }, document.getElementById('route-b'));
    window.hoverEffect = new Polyline(points, { color: '#ffd92f', weight: 12 }, document.getElementById('hover-effect'));
    for (const route of [routeA, routeB]) {
      route.on('mouseover', () => route.setStyle({ weight: 11 }));
      route.on('mouseout', () => route.setStyle({ weight: 3 }));
      route.on('click', () => { document.getElementById('trip-details').style.display = 'block'; });
      route._popup = { native: true };
    }
    window.L = { Polyline, Polygon, Map: MapStub };
    window.mapsPlaceholder = new MapStub([routeA, routeB, hoverEffect]);
    if (new URLSearchParams(location.search).get('verify') === '1') {
      setTimeout(() => {
        document.documentElement.dataset.bpbBaseWidth = String(routeA.options.weight);
        document.getElementById('route-a').dispatchEvent(new MouseEvent('mouseover', { bubbles: true }));
        document.documentElement.dataset.bpbHoverWidth = String(routeA.options.weight);
        document.getElementById('route-a').dispatchEvent(new MouseEvent('mouseout', { bubbles: true }));
        queueMicrotask(() => {
          document.documentElement.dataset.bpbRestoredWidth = String(routeA.options.weight);
          document.getElementById('route-a').dispatchEvent(new MouseEvent('click', { bubbles: true }));
          document.documentElement.dataset.bpbDetails = getComputedStyle(document.getElementById('trip-details')).display;
        });
      }, 750);
    }
  </script>

  <script src="/src/big-map-bridge.js"></script>
  <script src="/src/gpx-metrics.js"></script>
  <script src="/src/terrain-basemap.js"></script>
  <script src="/src/terrain-map.js"></script>
  <script src="/src/big-map.js"></script>
  <script>
    window.addEventListener('load', () => {
      if (new URLSearchParams(location.search).get('mode3d') !== '1') return;
      let attempts = 0;
      const timer = setInterval(() => {
        attempts++;
        const toggle = document.getElementById('bpb-terrain-toggle');
        if (toggle && !toggle.disabled) { toggle.click(); clearInterval(timer); }
        else if (attempts >= 60) clearInterval(timer);
      }, 100);
    });
  </script>
</body>
</html>
