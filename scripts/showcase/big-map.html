<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Synthetic recent GPS tracks</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    /* The Full Screen page is a shell whose Leaflet map lives in a same-origin
       MasterMap.aspx child iframe; big-map.js runs here (not in the frame) and
       reaches into it. */
    #if { display: block; width: 100%; height: 100%; border: 0; }
  </style>
  <link rel="stylesheet" href="/dist/css/terrain-map.css">
  <script>
    // Showcase/harness stubs so the production content scripts run without the
    // packaged extension. Not shipped — this is a synthetic visual fixture.
    window.chrome = { runtime: { getURL: path => `/dist/${path}` } };
    (() => {
      const params = new URLSearchParams(location.search);
      const settings = {
        enable3dMap: true,
        theme: params.get('theme') === 'dark' ? 'dark' : 'light',
        mapRouteColor: '#d9483b', mapRouteWidth: 5,
        mapRouteCasingColor: '#ffffff', mapRouteCasingWidth: 9,
        terrainCacheLimitMb: 256
      };
      // The isolated bridge imports settings and reads chrome.storage now.
      window.chrome.storage = {
        sync: { get: async () => ({ bpbSettings: settings }) },
        onChanged: { addListener: () => {}, removeListener: () => {} }
      };
    })();
  </script>
</head>
<body>
  <iframe id="if" src="/map/MasterMap.aspx?big=1&cy=48.74&cx=-121.81&z=13&t=G&d=1&c=900001" title="Synthetic Peakbagger route map"></iframe>

  <script src="/dist/content/big-map-bridge.js"></script>
  <script src="/dist/content/big-map.js"></script>
  <script src="/dist/content/terrain-map.js"></script>
  <script>
    // Same race as the ascent showcase: the toggle enables from the native
    // tracks, but the drape is read from the MasterMap child frame's layer
    // menu. Clicking before that frame is up yields a legitimate "Terrain only"
    // fallback. Wait for the frame, the way a real user's timing does.
    window.addEventListener('load', () => {
      if (new URLSearchParams(location.search).get('mode3d') !== '1') return;
      const nativeMapReady = () => {
        const iframe = document.querySelector('iframe#if, iframe[src*="MasterMap.aspx" i]');
        try {
          return Boolean(iframe && iframe.contentWindow && iframe.contentWindow.mapsPlaceholder);
        } catch (error) {
          return false;
        }
      };
      let attempts = 0;
      const timer = setInterval(() => {
        attempts++;
        const toggle = document.getElementById('bpb-terrain-toggle');
        if (toggle && !toggle.disabled && nativeMapReady()) { toggle.click(); clearInterval(timer); }
        else if (attempts >= 60) clearInterval(timer);
      }, 100);
    });
  </script>
</body>
</html>
