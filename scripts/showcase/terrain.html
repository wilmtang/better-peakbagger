<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D terrain showcase</title>
  <link rel="stylesheet" href="/scripts/showcase/showcase.css">
  <link rel="stylesheet" href="/src/terrain-map.css">
  <style>
    body { overflow: auto; }
    .terrain-check { width: 860px; margin: 28px auto; padding: 22px 30px 34px; background: #f7f5ef; }
    .terrain-check h2 { margin: 0 0 4px; text-align: center; color: #752522; font: 21px Georgia, serif; }
    .terrain-check > p { margin: 0 0 12px; text-align: center; color: #655d58; font-size: 12px; }
    .terrain-check .map-shell { width: 800px; min-height: 468px; }
    .terrain-check iframe { display: block; width: 100%; height: 450px; border: 0; }
    .terrain-check .analyzer-shell > a { color: #174d82; font-size: 11px; }
  </style>
  <script>
    window.chrome = { runtime: { getURL: path => `/${path}` } };
    window.BPBSettings = {
      get: async () => ({ enable3dMap: true }),
      subscribe: () => () => {}
    };
    window.addEventListener('message', event => {
      if (event.source !== window || !event.data || event.data.__bpb !== true || event.data.dir !== 'toCS') return;
      const params = new URLSearchParams(location.search);
      const wide = params.get('map') === 'wide';
      const theme = params.get('theme') === 'dark' ? 'dark' : 'light';
      window.postMessage({
        __bpb: true,
        dir: 'toPage',
        settings: {
          units: 'imperial', theme, chartDefaultSeries: 'both', enable3dMap: true,
          mapViewportWidth: wide ? 800 : 450, mapViewportHeight: 450,
          terrainCacheLimitMb: 256
        }
      }, location.origin);
    });
  </script>
</head>
<body>
  <main class="terrain-check">
    <h2>Mount Baker — Easton Glacier</h2>
    <p>Synthetic route · terrain renderer visual check</p>
    <div class="map-shell">
      <iframe src="/map/MasterMap.aspx?cy=48.74&cx=-121.81&z=13&t=A&d=1&c=900001&hj=0" title="Synthetic Peakbagger route map"></iframe>
    </div>
    <div class="analyzer-shell">
      <a href="/scripts/showcase/terrain.gpx">Download this GPS track</a>
    </div>
    <a href="/map/BigMap.aspx">Click Here for a Full Screen Map</a>
  </main>

  <script src="/vendor/chart.umd.min.js"></script>
  <script src="/src/gpx-metrics.js"></script>
  <script src="/src/terrain-basemap.js"></script>
  <script src="/src/peak-markers.js"></script>
  <script src="/src/terrain-map.js"></script>
  <script src="/src/settings-schema.js"></script>
  <script src="/src/gpx-analyzer.js"></script>
  <script>
    // The toggle enables as soon as the GPX parses, but the drape is read from
    // the MasterMap iframe's Leaflet globals, which load independently. Clicking
    // on the toggle alone races that: when the GPX wins, getTerrainBasemap()
    // sees no map, and the frame legitimately falls back to "Terrain only".
    // A real user clicks seconds later, so wait for the map the way they do.
    window.addEventListener('load', () => {
      const mode = new URLSearchParams(location.search).get('mode');
      const nativeMapReady = () => {
        const iframe = document.querySelector('iframe[src*="MasterMap.aspx" i]');
        try {
          return Boolean(iframe && iframe.contentWindow && iframe.contentWindow.mapsPlaceholder);
        } catch (error) {
          return false;
        }
      };
      let attempts = 0;
      const timer = setInterval(() => {
        attempts++;
        const toggle = document.getElementById('bpb-terrain-toggle');
        if (toggle && !toggle.disabled && nativeMapReady()) {
          if (mode === 'terrain') toggle.click();
          clearInterval(timer);
        } else if (attempts >= 50) {
          clearInterval(timer);
        }
      }, 100);
    });
  </script>
</body>
</html>
