<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Synthetic Peak page terrain map</title>
  <link rel="stylesheet" href="/dist/css/terrain-map.css">
  <style>
    body { margin: 24px; color: #222; font: 14px Arial, sans-serif; }
    h1 { margin: 0 0 16px; color: #752522; font: 26px Georgia, serif; }
    table { width: min(760px, 100%); border-collapse: collapse; }
  </style>
  <script>
    const theme = new URLSearchParams(location.search).get('theme') === 'dark' ? 'dark' : 'light';
    window.chrome = {
      runtime: { getURL: path => `/dist/${path}` },
      storage: {
        sync: { get: async () => ({ bpbSettings: { enable3dMap: true, theme, terrainCacheLimitMb: 256 } }) },
        onChanged: { addListener: () => {}, removeListener: () => {} }
      }
    };
    if (theme === 'dark') {
      document.documentElement.style.background = '#1f2321';
      document.documentElement.style.colorScheme = 'dark';
    }
  </script>
</head>
<body>
  <h1>Mount Shuksan, Washington</h1>
  <table><tbody><tr><td align="center">
    <b>Dynamic Map</b><br>
    <iframe id="Gmap"
      src="/map/MasterMap.aspx?cy=48.83115&amp;cx=-121.60214&amp;z=14&amp;t=P&amp;d=2829&amp;c=0"
      width="100%" height="425px" title="Synthetic Peakbagger dynamic map"></iframe><br>
    <img src="/image/MainPeakPinkCircle.gif" alt="">&nbsp;Mount Shuksan&nbsp;(Unclimbed!)<br>
    <a href="/map/BigMap.aspx?cy=48.83115&amp;cx=-121.60214&amp;z=14&amp;l=L_CT|L_OT&amp;t=P&amp;d=2829&amp;c=0">Click Here for a Full Screen Map</a>
  </td></tr></tbody></table>

  <script src="/dist/content/peak-map-bridge.js"></script>
  <script src="/dist/content/peak-map.js"></script>
  <script src="/dist/content/terrain-map.js"></script>
</body>
</html>
