<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Route map</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      position: relative;
      background:
        radial-gradient(ellipse at 75% 19%, rgba(239,240,224,.92) 0 8%, transparent 9%),
        linear-gradient(28deg, transparent 47%, rgba(112,137,103,.28) 48%, transparent 49%) 0 0/50px 50px,
        linear-gradient(152deg, transparent 47%, rgba(95,124,91,.22) 48%, transparent 49%) 0 0/72px 72px,
        linear-gradient(135deg, #b8ccb1 0%, #e1dec4 46%, #a8c3a4 100%);
      font: 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #314336;
    }

    svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .route-shadow { fill: none; stroke: rgba(255,255,255,.95); stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
    .route { fill: none; stroke: #d44a37; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .contour { fill: none; stroke: rgba(79,108,75,.25); stroke-width: 1; }

    .label {
      position: absolute;
      border-radius: 4px;
      padding: 3px 5px;
      color: #34463a;
      background: rgba(255,255,255,.86);
      box-shadow: 0 1px 3px rgba(37,55,42,.15);
      font-weight: 700;
    }
    .trailhead { left: 8%; bottom: 10%; }
    .camp { left: 44%; top: 49%; }
    .summit { right: 7%; top: 8%; }

    .leaflet-control {
      position: absolute;
      left: 10px;
      top: 10px;
      display: grid;
      overflow: hidden;
      border: 1px solid #aeb6ae;
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .leaflet-control b { width: 27px; height: 27px; text-align: center; font-size: 19px; line-height: 25px; }
    .leaflet-control b + b { border-top: 1px solid #ccd1cc; }
    .attribution { position: absolute; right: 4px; bottom: 3px; color: #607064; font-size: 9px; }

    .track-marker {
      position: absolute;
      z-index: 5;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: #f00;
      box-shadow: 0 2px 8px rgba(68,0,0,.55), 0 0 0 3px rgba(255,255,255,.32);
      transition: left .12s linear, top .12s linear;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 320 430" preserveAspectRatio="none" aria-hidden="true">
    <path class="contour" d="M-20 345 C65 260 99 387 174 288 S270 234 344 130"/>
    <path class="contour" d="M-25 379 C55 298 112 411 185 319 S275 266 350 171"/>
    <path class="contour" d="M-30 305 C38 220 110 344 163 249 S257 187 338 88"/>
    <path class="contour" d="M-30 261 C42 191 112 292 165 205 S252 143 332 52"/>
    <path class="route-shadow" d="M31 377 C52 336 90 352 105 303 S136 263 145 232 S185 222 194 179 S235 160 239 119 S275 98 291 55"/>
    <path class="route" d="M31 377 C52 336 90 352 105 303 S136 263 145 232 S185 222 194 179 S235 160 239 119 S275 98 291 55"/>
  </svg>
  <span class="label trailhead">Trailhead</span>
  <span class="label camp">Camp</span>
  <span class="label summit">Summit</span>
  <span class="leaflet-control"><b>+</b><b>−</b></span>
  <span class="attribution">Leaflet · Peakbagger map</span>

  <script>
    const map = window.mapsPlaceholder = {};
    const pointToPercent = ([lat, lon]) => {
      const x = 9 + ((lon + 121.88) / .07) * 82;
      const y = 89 - ((lat - 48.72) / .08) * 80;
      return [Math.max(5, Math.min(95, x)), Math.max(5, Math.min(95, y))];
    };

    window.L = {
      circleMarker(latLng, options) {
        let markerElement = null;
        const marker = {
          _map: null,
          addTo(targetMap) {
            this._map = targetMap;
            markerElement = document.createElement('span');
            markerElement.className = 'track-marker';
            document.body.append(markerElement);
            this.setLatLng(latLng);
            this.setStyle(options);
            return this;
          },
          setLatLng(next) {
            const [left, top] = pointToPercent(next);
            markerElement.style.left = `${left}%`;
            markerElement.style.top = `${top}%`;
            return this;
          },
          setStyle(style) {
            markerElement.style.background = style.fillColor || '#f00';
            markerElement.style.borderColor = style.color || '#fff';
            markerElement.style.opacity = style.opacity == null ? '1' : String(style.opacity);
            return this;
          }
        };
        return marker;
      }
    };
  </script>
</body>
</html>
