<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Route map</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      position: relative;
      background: #e8e8dc;
      font: 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #314336;
    }

    .basemap, svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .basemap { object-fit: cover; }
    .route-shadow, .route { fill: none; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .route-shadow { display: none; }
    .route { stroke: #d9483b; stroke-width: 2; opacity: .75; }

    .leaflet-control {
      position: absolute;
      left: 10px;
      top: 10px;
      display: grid;
      overflow: hidden;
      border: 1px solid #aeb6ae;
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .leaflet-control b { width: 27px; height: 27px; text-align: center; font-size: 19px; line-height: 25px; }
    .leaflet-control b + b { border-top: 1px solid #ccd1cc; }
    .attribution {
      position: absolute;
      right: 3px;
      bottom: 2px;
      padding: 2px 4px;
      color: #394d40;
      background: rgba(255,255,255,.82);
      font-size: 8px;
    }

    .track-marker {
      position: absolute;
      z-index: 5;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: #f00;
      box-shadow: 0 2px 8px rgba(68,0,0,.55), 0 0 0 3px rgba(255,255,255,.32);
      transition: left .12s linear, top .12s linear;
    }
  </style>
</head>
<body>
  <img class="basemap" src="/scripts/showcase/usgs-topo.png" alt="">
  <svg viewBox="0 0 1000 1000" preserveAspectRatio="none" aria-hidden="true">
    <polyline class="route-shadow" id="route-shadow"/>
    <polyline class="route" id="route"/>
  </svg>
  <span class="leaflet-control"><b>+</b><b>−</b></span>
  <span class="attribution">Synthetic demo track · Map services and data: U.S. Geological Survey, National Geospatial Program</span>

  <script>
    const bounds = { west: -122.005, east: -121.625, south: 48.699875, north: 48.790125 };
    const routePoints = [
      [48.7061, -121.8098],
      [48.7114, -121.8112],
      [48.7183, -121.8138],
      [48.7252, -121.8167],
      [48.7338, -121.8182],
      [48.7417, -121.8175],
      [48.7501, -121.8158],
      [48.7584, -121.8167],
      [48.7661, -121.8160],
      [48.7725, -121.8147],
      [48.7770, -121.8130]
    ];

    const pointToPercent = ([lat, lon]) => {
      const x = ((lon - bounds.west) / (bounds.east - bounds.west)) * 100;
      const y = ((bounds.north - lat) / (bounds.north - bounds.south)) * 100;
      return [Math.max(1, Math.min(99, x)), Math.max(1, Math.min(99, y))];
    };

    const projectedRoute = routePoints.map(point => {
      const [x, y] = pointToPercent(point);
      return `${(x * 10).toFixed(2)},${(y * 10).toFixed(2)}`;
    }).join(' ');
    document.getElementById('route-shadow').setAttribute('points', projectedRoute);
    document.getElementById('route').setAttribute('points', projectedRoute);

    const svg = document.querySelector('svg');
    const map = window.mapsPlaceholder = {
      _layers: [],
      removeLayer(layer) {
        this._layers = this._layers.filter(candidate => candidate !== layer);
        if (layer && typeof layer._remove === 'function') layer._remove();
        return this;
      }
    };

    const svgPath = latLngs => {
      const segments = Array.isArray(latLngs[0] && latLngs[0][0]) ? latLngs : [latLngs];
      return segments.map(segment => segment.map((point, index) => {
        const [x, y] = pointToPercent(point);
        return `${index ? 'L' : 'M'}${(x * 10).toFixed(2)} ${(y * 10).toFixed(2)}`;
      }).join(' ')).join(' ');
    };

    window.L = {
      polyline(latLngs, options) {
        let element = null;
        return {
          _map: null,
          addTo(targetMap) {
            this._map = targetMap;
            element = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            element.setAttribute('d', svgPath(latLngs));
            element.setAttribute('fill', 'none');
            if (options.className) element.setAttribute('class', options.className);
            svg.append(element);
            targetMap._layers.push(this);
            this.setStyle(options);
            return this;
          },
          setStyle(style) {
            element.setAttribute('stroke', style.color || '#d9483b');
            element.setAttribute('stroke-width', String(style.weight || 3));
            element.setAttribute('stroke-opacity', String(style.opacity == null ? 1 : style.opacity));
            element.setAttribute('stroke-linecap', style.lineCap || 'round');
            element.setAttribute('stroke-linejoin', style.lineJoin || 'round');
            element.style.pointerEvents = style.interactive === false ? 'none' : '';
            element.style.vectorEffect = 'non-scaling-stroke';
            return this;
          },
          bringToBack() {
            if (element) svg.insertBefore(element, svg.firstChild);
            return this;
          },
          _remove() {
            if (element) element.remove();
            element = null;
            this._map = null;
          }
        };
      },
      circleMarker(latLng, options) {
        let markerElement = null;
        const marker = {
          _map: null,
          addTo(targetMap) {
            this._map = targetMap;
            markerElement = document.createElement('span');
            markerElement.className = 'track-marker';
            document.body.append(markerElement);
            this.setLatLng(latLng);
            this.setStyle(options);
            return this;
          },
          setLatLng(next) {
            const [left, top] = pointToPercent(next);
            markerElement.style.left = `${left}%`;
            markerElement.style.top = `${top}%`;
            return this;
          },
          setStyle(style) {
            markerElement.style.background = style.fillColor || '#f00';
            markerElement.style.borderColor = style.color || '#fff';
            markerElement.style.opacity = style.opacity == null ? '1' : String(style.opacity);
            return this;
          }
        };
        return marker;
      }
    };
  </script>
</body>
</html>
