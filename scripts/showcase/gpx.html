<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPX analyzer showcase</title>
  <link rel="stylesheet" href="/scripts/showcase/showcase.css">
  <script>
    window.addEventListener('message', event => {
      if (event.source !== window || !event.data || event.data.__bpb !== true || event.data.dir !== 'toCS') return;
      window.postMessage({
        __bpb: true,
        dir: 'toPage',
        settings: { units: 'imperial', theme: 'light', chartDefaultSeries: 'both' }
      }, location.origin);
    });
  </script>
</head>
<body class="gpx-showcase-page">
  <main class="showcase gpx-showcase">
    <section class="browser">
      <div class="browser-bar">
        <span class="traffic-lights"><i></i><i></i><i></i></span>
        <div class="address">peakbagger.com/climber/ascent.aspx?aid=482614</div>
      </div>
      <div class="gpx-stage">
        <div class="gpx-page">
          <div class="gpx-title">
            <h2>Mount Baker — Easton Glacier</h2>
            <p>July 10–12, 2026 · Synthetic three-day demo track</p>
          </div>
          <aside class="map-card">
            <iframe src="/scripts/showcase/MasterMap.aspx" title="Peakbagger Leaflet route map"></iframe>
          </aside>
          <div class="analyzer-column">
            <a href="/scripts/showcase/multiday.gpx">Download this GPS track</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/vendor/chart.umd.min.js"></script>
  <script src="/vendor/tz-lookup.js"></script>
  <script src="/src/gpx-metrics.js"></script>
  <script src="/src/settings-schema.js"></script>
  <script src="/src/gpx-analyzer.js"></script>
  <script>
    const hoverFraction = Math.min(.88, Math.max(.12, Number(new URLSearchParams(location.search).get('hover')) || .56));

    const placeChartHover = () => {
      const canvas = document.querySelector('canvas');
      const iframe = document.querySelector('iframe[src*="MasterMap.aspx"]');
      const chart = canvas && window.Chart && Chart.getChart(canvas);
      if (!chart || !iframe || !iframe.contentWindow || !iframe.contentWindow.L) return false;

      const meta = chart.getDatasetMeta(0);
      const index = Math.min(meta.data.length - 1, Math.max(0, Math.round((meta.data.length - 1) * hoverFraction)));
      const active = [{ datasetIndex: 0, index }];
      const point = meta.data[index];
      chart.setActiveElements(active);
      chart.tooltip.setActiveElements(active, { x: point.x, y: point.y });
      chart.options.onHover(null, active, chart);
      chart.update();

      let cursor = canvas.parentElement.querySelector('.showcase-cursor');
      if (!cursor) {
        cursor = document.createElement('span');
        cursor.className = 'showcase-cursor';
        cursor.setAttribute('aria-hidden', 'true');
        cursor.innerHTML = '<svg viewBox="0 0 24 30"><path d="M3 2v22l6-6 4 9 4-2-4-9h8z"/></svg>';
        canvas.parentElement.append(cursor);
      }
      cursor.style.left = `${point.x}px`;
      cursor.style.top = `${point.y}px`;
      return !!iframe.contentDocument.querySelector('.track-marker');
    };

    window.addEventListener('load', () => {
      let attempts = 0;
      const timer = setInterval(() => {
        attempts++;
        if (placeChartHover() || attempts >= 20) clearInterval(timer);
      }, 100);
    });
  </script>
</body>
</html>
